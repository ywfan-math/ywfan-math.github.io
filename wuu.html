<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple clicker · github single‑html game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #1b2b3f 0%, #223544 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
        }
        .game-container {
            background: rgba(18, 28, 40, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 42px;
            padding: 26px 24px 32px 24px;
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.7), inset 0 2px 3px rgba(255,255,255,0.1);
            border: 1px solid #4f6e8b;
            width: min(100%, 500px);
        }
        h1 {
            text-align: center;
            margin: 0 0 18px 0;
            font-weight: 400;
            font-size: 2.1rem;
            letter-spacing: 2px;
            color: #d4eaff;
            text-shadow: 0 4px 8px #0a141f, 0 0 8px #3d8cbd;
            word-break: break-word;
        }
        .score-panel {
            background: #0e1a24;
            border-radius: 120px;
            padding: 20px 28px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #3d6682;
            box-shadow: inset 0 5px 5px rgba(0,0,0,0.8), 0 8px 12px rgba(0, 10, 20, 0.6);
        }
        .score-label {
            color: #a5c9e5;
            font-size: 1.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .score-value {
            background: #010e16;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 2.6rem;
            font-weight: 700;
            color: #f0fcb6;
            text-shadow: 0 0 12px #b3d160;
            font-family: 'Courier New', monospace;
            border: 1px solid #6c8daa;
            box-shadow: inset 0 2px 5px #000000;
            line-height: 1;
        }
        .click-area {
            background: #24455b;
            background: radial-gradient(circle at 30% 20%, #3e6f8f, #153547);
            border-radius: 52px;
            padding: 38px 24px;
            margin-bottom: 36px;
            cursor: pointer;
            border: 3px solid #75a3c4;
            box-shadow: 0 18px 15px -8px black, inset -2px -3px 8px #10212b, inset 3px 4px 12px #9ac7ec;
            transition: all 0.07s ease;
            text-align: center;
        }
        .click-area:active {
            transform: scale(0.97);
            background: radial-gradient(circle at 30% 20%, #3e7fa3, #103341);
            box-shadow: 0 6px 10px -3px black, inset -2px -3px 8px #0b1a23, inset 3px 4px 15px #b8defa;
        }
        .click-area p {
            font-size: 2.8rem;
            margin: 0;
            font-weight: 500;
            color: #f7ffe0;
            text-shadow: 0 4px 3px #0f2838, 0 0 20px #f5ffb0;
            pointer-events: none;
        }
        .click-hint {
            font-size: 1.1rem;
            color: #c2ddee;
            margin-top: 10px;
            letter-spacing: 1px;
            font-style: italic;
        }
        .reset-area {
            display: flex;
            justify-content: center;
        }
        .reset-btn {
            background: #1e3343;
            border: 2px solid #57758f;
            color: #d9ecff;
            font-size: 1.8rem;
            font-weight: 400;
            padding: 14px 45px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 6px;
            box-shadow: 0 10px 0 #0b1a24, 0 8px 18px black;
            transition: 0.07s linear;
            text-align: center;
            background: linear-gradient(180deg, #264b60 0%, #17323f 100%);
        }
        .reset-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #0b1a24, 0 8px 18px black;
        }
        footer {
            text-align: center;
            color: #617e97;
            margin-top: 25px;
            font-size: 0.9rem;
            border-top: 1px dashed #2f4e67;
            padding-top: 18px;
        }
        footer a {
            color: #b0d6ff;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍪 SIMPLE CLICKER</h1>

        <!-- score display -->
        <div class="score-panel">
            <span class="score-label">score</span>
            <span class="score-value" id="scoreDisplay">0</span>
        </div>

        <!-- main clickable zone -->
        <div class="click-area" id="clickButton" role="button" tabindex="0" aria-label="click to increase score">
            <p>✨ CLICK ✨</p>
            <div class="click-hint">▼ tap anywhere here ▼</div>
        </div>

        <!-- reset button -->
        <div class="reset-area">
            <div class="reset-btn" id="resetButton" role="button" tabindex="0" aria-label="reset score to zero">
                ↻ reset
            </div>
        </div>

        <footer>
            ⚡ single‑html · hosted on <a href="#" target="_blank">github</a> · click & fun
        </footer>
    </div>

    <script>
        (function() {
            // ----- game state -----
            let score = 0;

            // ----- DOM elements -----
            const scoreElement = document.getElementById('scoreDisplay');
            const clickArea = document.getElementById('clickButton');
            const resetBtn = document.getElementById('resetButton');

            // helper: update the displayed score with simple animation (quick class)
            function updateScoreDisplay(newScore) {
                scoreElement.textContent = newScore;
                // tiny visual feedback on the number itself
                scoreElement.style.transition = 'transform 0.08s, color 0.08s';
                scoreElement.style.transform = 'scale(1.2)';
                scoreElement.style.color = '#ffffb0';
                setTimeout(() => {
                    scoreElement.style.transform = 'scale(1)';
                    scoreElement.style.color = '#f0fcb6';
                }, 90);
            }

            // increment score (max 9999 to keep it tidy, but it's not strict)
            function handleClick() {
                if (score < 9999) {  // avoid getting too huge, but it's just for fun
                    score++;
                } else {
                    score = 9999;      // cap at 9999, but you can still click – stays at 9999
                }
                updateScoreDisplay(score);
            }

            // reset score to zero
            function handleReset() {
                score = 0;
                updateScoreDisplay(score);
                // additional small feedback on reset button
                resetBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    resetBtn.style.transform = 'scale(1)';
                }, 90);
            }

            // ----- event listeners -----
            clickArea.addEventListener('click', (e) => {
                e.stopPropagation();  // just good practice
                handleClick();
            });

            // keyboard accessibility: pressing Enter or Space on the click area
            clickArea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();  // prevent page scroll on space
                    handleClick();
                }
            });

            // reset button click
            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                handleReset();
            });

            // keyboard for reset button
            resetBtn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    handleReset();
                }
            });

            // make sure divs are focusable (already have tabindex)
            // optional: add a small ripple effect when clicked anywhere (just for polish)
            clickArea.addEventListener('mousedown', () => {
                clickArea.style.transform = 'scale(0.97)';
            });
            clickArea.addEventListener('mouseup', () => {
                clickArea.style.transform = 'scale(1)';
            });
            clickArea.addEventListener('mouseleave', () => {
                clickArea.style.transform = 'scale(1)';
            });

            // initialize display
            updateScoreDisplay(0);
        })();
    </script>

    <!-- tiny extra style to show focus for accessibility -->
    <style>
        .click-area:focus-visible, .reset-btn:focus-visible {
            outline: 4px solid #f6c978;
            outline-offset: 4px;
        }
    </style>
</body>
</html>
