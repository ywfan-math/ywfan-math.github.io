<!DOCTYPE html>
<html lang="en">
<head >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guess who · mathematician edition</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #2c3e50 0%, #1e2a36 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-card {
            max-width: 680px;
            width: 100%;
            background: rgba(22, 34, 48, 0.9);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 32px 28px 40px 28px;
            box-shadow: 0 30px 35px -12px black, inset 0 1px 4px rgba(255,255,240,0.15);
            border: 1px solid #5f7f9c;
            text-align: center;
        }
        h1 {
            color: #f6e9d2;
            font-weight: 400;
            font-size: 2.5rem;
            margin: 0 0 12px 0;
            text-shadow: 0 4px 8px #0a121c, 0 0 6px #aaccff;
            letter-spacing: 2.5px;
        }
        .subhead {
            color: #cbdaea;
            font-size: 1.15rem;
            margin-bottom: 28px;
            font-style: italic;
            border-bottom: 1px dashed #4d6f89;
            padding-bottom: 14px;
        }
        /* portrait area */
        .portrait-frame {
            background: #17232e;
            border-radius: 38px;
            padding: 22px 22px 16px 22px;
            margin-bottom: 24px;
            border: 2px solid #6e92b0;
            box-shadow: inset 0 0 0 2px #0a1a26, 0 14px 18px -10px black;
        }
        .portrait-img {
            background: #28445a;
            background: linear-gradient(145deg, #315d79, #193244);
            border-radius: 28px;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #9ac2e0;
            box-shadow: inset 0 -4px 8px #0b1a24;
            min-height: 220px;
        }
        /* pure css/svg "image" – a stylised mathematician portrait */
        .svg-portrait {
            width: 100%;
            max-width: 300px;
            height: auto;
        }
        .caption {
            color: #bedcff;
            margin-top: 14px;
            font-size: 1rem;
            letter-spacing: 1px;
            background: #0e1f2b;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 40px;
        }
        /* question */
        .question {
            font-size: 1.9rem;
            font-weight: 500;
            color: #faf3dd;
            margin: 30px 0 28px 0;
            text-shadow: 0 2px 5px #030a10;
            background: #1d3140;
            padding: 16px 10px;
            border-radius: 70px;
            border: 1px solid #63839e;
        }
        /* options grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .option-btn {
            background: #1e3445;
            border: 3px solid #4d6c88;
            color: #f0f2f0;
            font-size: 1.6rem;
            font-weight: 500;
            padding: 20px 8px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1e2b, 0 6px 15px black;
            transition: 0.07s linear;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 3px black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .option-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1e2b, 0 6px 15px black;
        }
        .option-btn.selected-correct {
            background: #256f4a;
            border-color: #b2ffb0;
            box-shadow: 0 4px 0 #0a3b2a, 0 6px 15px black;
            transform: translateY(2px);
        }
        .option-btn.selected-wrong {
            background: #8b3840;
            border-color: #ffb0b0;
            box-shadow: 0 4px 0 #4f1e24, 0 6px 15px black;
            transform: translateY(2px);
            text-decoration: line-through wavy #ffcaca 2px;
        }
        .disabled-click {
            pointer-events: none;
            opacity: 0.9;
        }
        /* feedback & reset */
        .feedback-area {
            min-height: 58px;
            font-size: 1.5rem;
            color: #ffe7b6;
            margin: 10px 0 25px;
            padding: 8px;
            background: #0a1a26b0;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-btn {
            background: #2b4a61;
            border: 2px solid #87aecb;
            color: #fcf9ea;
            font-size: 1.8rem;
            padding: 16px 30px;
            border-radius: 60px;
            cursor: pointer;
            display: inline-block;
            width: auto;
            min-width: 220px;
            box-shadow: 0 8px 0 #14313f, 0 8px 18px black;
            transition: 0.07s;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 400;
            margin-top: 8px;
        }
        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #14313f, 0 8px 18px black;
        }
        footer {
            color: #57758c;
            margin-top: 32px;
            font-size: 0.9rem;
            border-top: 1px solid #314e62;
            padding-top: 18px;
        }
        footer a {
            color: #b3d6f5;
        }
        /* focus outline for accessibility */
        .option-btn:focus-visible, .reset-btn:focus-visible {
            outline: 5px solid #ffcf8a;
            outline-offset: 4px;
        }
    </style>
</head>
<body>
<div class="game-card">
    <h1>🔍 WHO AM I ?</h1>
    <div class="subhead">a famous mathematician</div>

    <!-- picture of a mathematician (SVG illustration) -->
    <div class="portrait-frame">
        <div class="portrait-img">
            <svg class="svg-portrait" viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="stylised portrait of a mathematician with glasses and book">
                <!-- background glow -->
                <rect width="240" height="200" rx="30" fill="#284b63" />
                <!-- hair / hat (professorial) -->
                <path d="M60 45 L180 45 L170 80 L70 80 Z" fill="#2b221c" />
                <circle cx="120" cy="70" r="40" fill="#f9e0c0" />  <!-- face -->
                <!-- glasses -->
                <rect x="75" y="80" width="35" height="20" rx="10" fill="#b0c4d9" stroke="#2f3f4f" stroke-width="3" />
                <rect x="130" y="80" width="35" height="20" rx="10" fill="#b0c4d9" stroke="#2f3f4f" stroke-width="3" />
                <path d="M110 90 L130 90" stroke="#2f3f4f" stroke-width="4" stroke-linecap="round" />
                <!-- eyes -->
                <circle cx="92" cy="92" r="5" fill="#151515" />
                <circle cx="147" cy="92" r="5" fill="#151515" />
                <!-- moustache/beard -->
                <path d="M100 115 Q120 130 140 115" stroke="#5f4c3b" stroke-width="10" fill="none" stroke-linecap="round" />
                <!-- book in hand -->
                <rect x="160" y="130" width="35" height="25" rx="4" fill="#8b6b4d" />
                <line x1="165" y1="135" x2="190" y2="135" stroke="#efd7b6" stroke-width="2" />
                <line x1="165" y1="142" x2="190" y2="142" stroke="#efd7b6" stroke-width="2" />
                <!-- body / jacket -->
                <rect x="80" y="130" width="80" height="35" rx="10" fill="#1f4b6e" />
            </svg>
        </div>
        <div class="caption">📸 portrait c. 1870 (reconstructed)</div>
    </div>

    <!-- guess prompt -->
    <div class="question">⚡ this mathematician is ...</div>

    <!-- option buttons (dynamic will be filled by js) -->
    <div class="options-grid" id="optionsContainer"></div>

    <!-- feedback & reset row -->
    <div class="feedback-area" id="feedbackMessage">🤔 choose an option</div>

    <div class="reset-btn" id="resetGameBtn" role="button" tabindex="0">↻ play again</div>

    <footer>
        🧮 single‑html · github friendly · guess the mathematician
    </footer>
</div>

<script>
    (function() {
        // ---------- QUIZ DATA ----------
        // We have 4 mathematicians, with one correct answer (Gauss)
        const mathematicians = [
            { name: 'Carl F. Gauss', isCorrect: true },
            { name: 'Leonhard Euler', isCorrect: false },
            { name: 'Ada Lovelace', isCorrect: false },
            { name: 'Srinivasa Ramanujan', isCorrect: false }
        ];

        // current game state
        let selectedIndex = null;          // index of clicked option (0..3)
        let gameActive = true;              // true = not answered yet; false = after guess
        let correctAnswerIndex = 0;          // Gauss is at index 0 (see above)

        // DOM elements
        const optionsDiv = document.getElementById('optionsContainer');
        const feedbackEl = document.getElementById('feedbackMessage');
        const resetBtn = document.getElementById('resetGameBtn');

        // Helper: shuffle array (Fisher–Yates) for fresh order each reset, but keep track of correct one
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // rebuilds options in random order, preserves correct index
        function buildOptions() {
            // make a copy of mathematicians and shuffle
            const shuffled = shuffleArray([...mathematicians]);
            // find new correct index (where isCorrect == true)
            const newCorrectIdx = shuffled.findIndex(m => m.isCorrect === true);

            // store in data attribute if needed, but we'll keep correctAnswerIndex updated
            correctAnswerIndex = newCorrectIdx;   // update global correct index for this shuffled order

            // clear container
            optionsDiv.innerHTML = '';

            // create button for each mathematician
            shuffled.forEach((mat, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.setAttribute('role', 'button');
                btn.setAttribute('tabindex', '0');
                btn.dataset.index = idx;           // store current position
                btn.textContent = mat.name;

                // attach click listener
                btn.addEventListener('click', optionClickHandler);
                btn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        optionClickHandler.call(btn, e);
                    }
                });

                optionsDiv.appendChild(btn);
            });

            // reset selection and gameActive
            selectedIndex = null;
            gameActive = true;
            // remove any leftover 'selected' classes & re-enable clicks
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected-correct', 'selected-wrong');
            });
            // enable pointer (remove disabled class from container)
            optionsDiv.classList.remove('disabled-click');
            feedbackEl.textContent = '🤔 choose an option';
        }

        // click handler for option buttons
        function optionClickHandler(event) {
            const btn = event.currentTarget;
            // if game not active (already answered) ignore
            if (!gameActive) return;

            const idx = parseInt(btn.dataset.index, 10);   // index in current shuffled list

            // if an option was already selected? we prevent double answer (but we can ignore or disable)
            // simpler: if we already have selectedIndex !== null, do nothing (they can't change)
            if (selectedIndex !== null) return;

            // mark this button as selected
            selectedIndex = idx;

            // determine correct / wrong
            const isCorrect = (idx === correctAnswerIndex);

            // add appropriate class to all buttons? we style only the clicked one, but also show correct one?
            // but we want to reveal: highlight correct in green, wrong picks in red.
            // better: show user which one was correct and mark his choice accordingly.
            // we'll loop through all buttons:
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach((button, i) => {
                if (i === correctAnswerIndex) {
                    button.classList.add('selected-correct');   // correct answer gets green
                } else if (i === idx && i !== correctAnswerIndex) {
                    button.classList.add('selected-wrong');      // player's wrong pick gets red
                }
                // if the player picked correctly, his button is already the correct index (green)
                if (i === idx && i === correctAnswerIndex) {
                    button.classList.add('selected-correct');    // already green, fine.
                }
            });

            // disable further clicks
            optionsDiv.classList.add('disabled-click');
            gameActive = false;

            // feedback message
            if (isCorrect) {
                feedbackEl.innerHTML = '✅ CORRECT! Well done.';
            } else {
                const correctName = allBtns[correctAnswerIndex]?.textContent || 'Gauss';
                feedbackEl.innerHTML = `❌ Nope ... it was ${correctName}.`;
            }
        }

        // reset everything (shuffle again, rebuild UI)
        function resetGame() {
            buildOptions();    // this already reshuffles and resets state
        }

        // initial build
        buildOptions();

        // reset button listener
        resetBtn.addEventListener('click', () => {
            resetGame();
        });
        resetBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                resetGame();
            }
        });

        // (optional) some extra flair: pressing the same reset with space/enter works
    })();
</script>
</body>
</html>
