<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematician portrait quiz · who am i?</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1f2e3f 0%, #17222d 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .quiz-container {
            max-width: 750px;
            width: 100%;
            background: rgba(20, 32, 45, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 28px 24px 36px 24px;
            box-shadow: 0 30px 35px -12px black, inset 0 1px 4px rgba(255,255,240,0.1);
            border: 1px solid #527a9b;
        }
        h1 {
            color: #f2e3cf;
            font-weight: 400;
            font-size: 2.3rem;
            margin: 0 0 10px 0;
            text-shadow: 0 4px 8px #0a111c, 0 0 6px #b3d6ff;
            letter-spacing: 2px;
            text-align: center;
        }
        .subhead {
            color: #b9d1e7;
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px dashed #3e5f78;
            padding-bottom: 12px;
        }
        /* progress tracker */
        .progress {
            display: flex;
            justify-content: space-between;
            background: #10222e;
            border-radius: 60px;
            padding: 10px 16px;
            margin-bottom: 28px;
            color: #bcd1e3;
            border: 1px solid #3b637d;
            font-size: 1.2rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        .question-num {
            background: #1a3445;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: 500;
        }
        .score {
            background: #1e3f4e;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: 500;
        }
        /* portrait image area */
        .portrait-card {
            background: #0f212f;
            border-radius: 38px;
            padding: 20px;
            margin-bottom: 24px;
            border: 2px solid #668bad;
            box-shadow: inset 0 0 0 2px #08212e, 0 12px 18px -10px black;
        }
        .image-wrapper {
            background: #1c364a;
            border-radius: 28px;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #8bb3d1;
            min-height: 240px;
        }
        .math-portrait {
            max-width: 100%;
            max-height: 260px;
            border-radius: 18px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6);
            border: 2px solid #cdddee;
            object-fit: cover;
            background: #e5e5e5;
        }
        .portrait-caption {
            color: #b8d1e9;
            margin-top: 12px;
            font-size: 0.9rem;
            text-align: center;
            font-style: italic;
        }
        /* question & options */
        .question-text {
            font-size: 2rem;
            font-weight: 500;
            color: #fcf3de;
            text-align: center;
            margin: 20px 0 28px 0;
            background: #1b3142;
            padding: 12px 8px;
            border-radius: 60px;
            border: 1px solid #64839e;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .option-btn {
            background: #1e3345;
            border: 3px solid #3b607b;
            color: #f0f2f0;
            font-size: 1.4rem;
            font-weight: 500;
            padding: 18px 6px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 7px 0 #0f1f2c, 0 6px 14px black;
            transition: 0.06s linear;
            text-align: center;
            line-height: 1.2;
            word-break: break-word;
        }
        .option-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0f1f2c, 0 6px 14px black;
        }
        .option-btn.correct-highlight {
            background: #1f6a4a;
            border-color: #bafab6;
            box-shadow: 0 4px 0 #0b3726, 0 6px 14px black;
            transform: translateY(3px);
        }
        .option-btn.wrong-highlight {
            background: #96404a;
            border-color: #ffb5b5;
            box-shadow: 0 4px 0 #502129, 0 6px 14px black;
            transform: translateY(3px);
            text-decoration: line-through wavy #f9c1c1 2px;
        }
        .disabled-options {
            pointer-events: none;
            opacity: 0.9;
        }
        /* feedback & next button */
        .feedback-area {
            min-height: 60px;
            font-size: 1.6rem;
            color: #ffeab3;
            background: #0a1d2b;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0 20px;
            padding: 12px 18px;
            border: 1px solid #5f819c;
        }
        .next-btn {
            background: #325d78;
            border: 2px solid #8eb6d4;
            color: #fcf9ea;
            font-size: 2rem;
            padding: 14px 30px;
            border-radius: 60px;
            cursor: pointer;
            display: inline-block;
            width: auto;
            min-width: 240px;
            box-shadow: 0 8px 0 #1a384b, 0 8px 18px black;
            transition: 0.06s;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 400;
            margin: 8px auto 0;
            border: none;
        }
        .next-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1a384b, 0 8px 18px black;
        }
        .next-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        .reset-btn {
            background: #2b4a61;
            border: 2px solid #87aecb;
            color: #fcf9ea;
            font-size: 1.5rem;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
            display: inline-block;
            width: auto;
            min-width: 180px;
            box-shadow: 0 6px 0 #14313f, 0 8px 18px black;
            transition: 0.06s;
            margin-left: 20px;
        }
        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #14313f, 0 8px 18px black;
        }
        .action-row {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        footer {
            color: #57758c;
            margin-top: 32px;
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #2e4e64;
            padding-top: 20px;
        }
        .attribution {
            font-size: 0.7rem;
            color: #6e8da5;
        }
        /* focus outline */
        .option-btn:focus-visible, .next-btn:focus-visible, .reset-btn:focus-visible {
            outline: 5px solid #ffcf8a;
            outline-offset: 4px;
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>📸 WHO AM I ?</h1>
    <div class="subhead">famous mathematicians – real portraits</div>

    <!-- progress bar -->
    <div class="progress">
        <span class="question-num" id="questionCounter">Q1 / 6</span>
        <span class="score" id="scoreDisplay">✅ 0</span>
    </div>

    <!-- image area (actual photos/paintings) -->
    <div class="portrait-card">
        <div class="image-wrapper" id="portraitWrapper">
            <img class="math-portrait" id="mathPortrait" src="https://via.placeholder.com/400x260/1e3f5a/white?text=Loading+portrait..." alt="mathematician portrait">
        </div>
        <div class="portrait-caption" id="imageCredit"></div>
    </div>

    <!-- question -->
    <div class="question-text">⚡ this mathematician is ...</div>

    <!-- options (4 buttons) -->
    <div class="options-grid" id="optionsContainer"></div>

    <!-- feedback & next/reset -->
    <div class="feedback-area" id="feedbackMessage">choose an option</div>

    <div class="action-row">
        <div class="next-btn" id="nextQuestionBtn" tabindex="0" role="button">➡️ next</div>
        <div class="reset-btn" id="resetGameBtn" tabindex="0" role="button">↻ restart</div>
    </div>

    <footer>
        <span class="attribution">images: public domain / library of congress, smithsonian, npg, nasa [citation 2,3,6,7,10]</span><br>
        single‑html · github friendly · mathematician quiz
    </footer>
</div>

<script>
    (function() {
        // ---------- QUIZ DATA: mathematicians with actual image URLs ----------
        // each object: name, imageUrl, credit (caption), and an array of 4 possible names (including correct)
        // for simplicity, the correct one is always at index 0 in the options array, but we shuffle later.
        const questions = [
            { 
                correct: "Leonhard Euler",
                image: "https://library.si.edu/sites/default/files/styles/media_gallery_landscape/public/images/people/portrait-of-leonhard-euler-73013.jpg?itok=2V-h3x5G", 
                credit: "Engraving by Dupin, Smithsonian Libraries [citation:10]",
                options: ["Leonhard Euler", "Carl Gauss", "Joseph Lagrange", "Daniel Bernoulli"]
            },
            {
                correct: "Ada Lovelace",
                image: "https://www.npg.org.uk/media/2390880/Ada-Lovelace-by-Margaret-Sarah-Carpener-1836-Promo.jpg", 
                credit: "Margaret Sarah Carpenter, 1836 · National Portrait Gallery, London [citation:3]",
                options: ["Ada Lovelace", "Mary Somerville", "Florence Nightingale", "Sophie Germain"]
            },
            {
                correct: "Bernhard Riemann",
                image: "https://tile.loc.gov/storage-services/service/pnp/cph/3c20000/3c20000/3c20300/3c20354_150px.jpg", 
                credit: "Library of Congress, halftone ca.1901 [citation:6]",
                options: ["Bernhard Riemann", "Augustin Cauchy", "Karl Weierstrass", "David Hilbert"]
            },
            {
                correct: "Katherine Johnson",
                image: "https://media.gettyimages.com/id/627024538/photo/nasa-space-scientist-and-mathematician-katherine-johnson-poses-for-a-portrait-at-her-desk.jpg?s=612x612&w=0&k=20&c=6L-fnzYyRwEoOOHvxRTgZCs7NhRucPzXYoRreZkek0A=", 
                credit: "NASA / Donaldson Collection / Getty Images [citation:7]",
                options: ["Katherine Johnson", "Dorothy Vaughan", "Mary Jackson", "Margaret Hamilton"]
            },
            {
                correct: "Srinivasa Ramanujan",
                image: "https://mathshistory.st-andrews.ac.uk/Biographies/Ramanujan/ramanujan_3.jpeg", 
                credit: "MacTutor History of Mathematics, public domain [citation:4]",
                options: ["Srinivasa Ramanujan", "J. C. Bose", "C. V. Raman", "H. J. Bhabha"]
            },
            {
                correct: "Hypatia",
                image: "https://www.mediastorehouse.com.au/f/582/583/1911_/portrait-hypatia-alexandria-370-415-mathematician-philosopher.jpg", 
                credit: "after A. Seifert, private collection [citation:5]",
                options: ["Hypatia", "Theano", "Agnese of Rome", "Arete of Cyrene"]
            }
        ];

        // ---------- game state ----------
        let currentQuestionIndex = 0;          // 0..5
        let score = 0;
        let selectedIdx = null;                // index of clicked option in current question
        let gameActive = true;                  // true if not yet answered
        let correctAnswerIndex = 0;              // will be set per question after shuffle
        let currentShuffledOptions = [];         // store shuffled names for current question

        // DOM elements
        const imgElement = document.getElementById('mathPortrait');
        const imgCredit = document.getElementById('imageCredit');
        const qCounter = document.getElementById('questionCounter');
        const scoreSpan = document.getElementById('scoreDisplay');
        const optionsDiv = document.getElementById('optionsContainer');
        const feedbackEl = document.getElementById('feedbackMessage');
        const nextBtn = document.getElementById('nextQuestionBtn');
        const resetBtn = document.getElementById('resetGameBtn');

        // ---------- helper: shuffle array (Fisher-Yates) ----------
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ---------- load current question (index) and update UI ----------
        function loadQuestion(index) {
            const q = questions[index];
            // set image & credit
            imgElement.src = q.image;
            imgElement.alt = `portrait of ${q.correct}`;
            imgCredit.textContent = q.credit;

            // shuffle options for this question
            const optsCopy = [...q.options];
            currentShuffledOptions = shuffleArray(optsCopy);
            // find where the correct name ended up
            correctAnswerIndex = currentShuffledOptions.findIndex(name => name === q.correct);

            // clear options container & rebuild buttons
            optionsDiv.innerHTML = '';
            currentShuffledOptions.forEach((name, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.setAttribute('role', 'button');
                btn.setAttribute('tabindex', '0');
                btn.dataset.index = idx;
                btn.textContent = name;
                btn.addEventListener('click', optionClickHandler);
                btn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        optionClickHandler.call(btn, e);
                    }
                });
                optionsDiv.appendChild(btn);
            });

            // reset selection state for new question
            selectedIdx = null;
            gameActive = true;
            // remove any extra classes & re-enable clicks
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('correct-highlight', 'wrong-highlight');
            });
            optionsDiv.classList.remove('disabled-options');
            feedbackEl.textContent = '🤔 choose an option';

            // update question counter
            qCounter.textContent = `Q${index+1} / ${questions.length}`;
        }

        // ---------- update score display ----------
        function updateScoreUI() {
            scoreSpan.textContent = `✅ ${score}`;
        }

        // ---------- option click handler ----------
        function optionClickHandler(event) {
            if (!gameActive) return;               // already answered
            const btn = event.currentTarget;
            const idx = parseInt(btn.dataset.index, 10);
            if (selectedIdx !== null) return;      // already selected an option (double click prevention)

            selectedIdx = idx;
            gameActive = false;

            // determine correct/incorrect
            const isCorrect = (idx === correctAnswerIndex);
            if (isCorrect) {
                score++;
                updateScoreUI();
            }

            // apply classes to all options: highlight correct green, and if wrong mark selected as red
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach((button, i) => {
                if (i === correctAnswerIndex) {
                    button.classList.add('correct-highlight');
                } else if (i === idx && i !== correctAnswerIndex) {
                    button.classList.add('wrong-highlight');
                }
                // if correct and selected same, already covered by correct-highlight
            });

            optionsDiv.classList.add('disabled-options');

            // feedback message
            if (isCorrect) {
                feedbackEl.innerHTML = '✅ CORRECT! Well done.';
            } else {
                const correctName = currentShuffledOptions[correctAnswerIndex];
                feedbackEl.innerHTML = `❌ No, it was ${correctName}.`;
            }
        }

        // ---------- move to next question ----------
        function goToNext() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
            } else {
                // end of quiz
                feedbackEl.innerHTML = '🎉 QUIZ COMPLETE! click restart to play again.';
                optionsDiv.classList.add('disabled-options');
                // disable next button maybe
                nextBtn.style.opacity = '0.4';
                nextBtn.style.pointerEvents = 'none';
            }
        }

        // ---------- restart entire quiz ----------
        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            updateScoreUI();
            // re-enable next button if disabled
            nextBtn.style.opacity = '1';
            nextBtn.style.pointerEvents = 'auto';
            loadQuestion(0);    // start fresh
        }

        // ---------- event listeners for next and reset ----------
        nextBtn.addEventListener('click', () => {
            // only allow if game is not active? but you can always move if not at end. But check end.
            if (currentQuestionIndex < questions.length - 1 || (currentQuestionIndex === questions.length - 1 && gameActive === false)) {
                goToNext();
            } else {
                // maybe if at last question and you haven't answered, warn? but we allow.
                if (currentQuestionIndex === questions.length - 1) {
                    // if it's last question you can still click, but do nothing if already answered (quiz complete)
                    if (!gameActive) {
                        // quiz complete message already shown, but still.
                        feedbackEl.innerHTML = '🏁 You finished! press restart.';
                    }
                }
            }
        });

        resetBtn.addEventListener('click', () => {
            restartQuiz();
        });

        // keyboard handling for reset/next
        nextBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                nextBtn.click();
            }
        });
        resetBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                restartQuiz();
            }
        });

        // ---------- init ----------
        loadQuestion(0);
        updateScoreUI();
    })();
</script>
</body>
</html>
